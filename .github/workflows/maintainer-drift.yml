name: Maintainer Health Check

on:
  schedule:
    - cron: '0 8 1 * *'  # Monthly on the 1st at 08:00 UTC
  workflow_dispatch:       # Also triggerable on demand

permissions:
  issues: write            # open / update health-check issues

jobs:
  health-check:
    runs-on: ubuntu-latest
    # timeout = DefaultHTTPTimeout (30s) × 30 = 900s = 15 min (defaults.go)
    # Managed by bootstrap_scaffold.go — do not edit this value directly.
    timeout-minutes: "15"
    steps:
      - name: Checkout .project repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0  # needed for git log age calculation

      - name: Checkout cncf/automation (health-check tooling)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          repository: cncf/automation
          # Pinned to the SHA that introduced this workflow.
          # Update this SHA when pulling in upstream health-check tooling changes.
          ref: 74b6112a55fe17053d90c4856037436ce6d01b85
          path: .cncf-automation
          sparse-checkout: utilities/dot-project
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: .cncf-automation/utilities/dot-project/go.mod

      - name: Build drift binary
        run: |
          cd .cncf-automation/utilities/dot-project
          go build -o /usr/local/bin/drift ./cmd/drift

      - name: Get days since maintainers.yaml last changed
        id: git_age
        run: |
          LAST_TS=$(git log -1 --format=%ct -- maintainers.yaml 2>/dev/null || echo "")
          if [ -z "$LAST_TS" ]; then
            DAYS=0
          else
            DAYS=$(( ( $(date +%s) - LAST_TS ) / 86400 ))
          fi
          echo "days=${DAYS}" >> "$GITHUB_OUTPUT"

      - name: Run maintainer health check
        id: healthcheck
        run: |
          EXIT_CODE=0
          drift \
            -project-yaml project.yaml \
            -maintainers-yaml maintainers.yaml \
            -report /tmp/health-report.md \
            -last-updated-days "${{ steps.git_age.outputs.days }}" \
          || EXIT_CODE=$?

          # exit 0 = not stale, no action needed
          # exit 1 = stale, issue body written to /tmp/health-report.md
          # exit 2 = tool error — log and don't open an issue
          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "is_stale=true" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT_CODE" -eq 2 ]; then
            echo "is_stale=false" >> "$GITHUB_OUTPUT"
            echo "::error::health-check tool exited with code 2 — check step logs above for the root cause (bad project.yaml / maintainers.yaml / GitHub API error)"
          else
            echo "is_stale=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # prevent tool errors from failing the workflow

      - name: Open or update health-check issue
        if: steps.healthcheck.outputs.is_stale == 'true'
        run: |
          LABEL="maintainer-health"
          TITLE="Maintainer list health check — please review"

          # Ensure the label exists (idempotent).
          gh label create "$LABEL" \
            --description "Automated maintainer health-check ping" \
            --color "e4e669" 2>/dev/null || true

          # Check for an existing open issue with this label.
          EXISTING=$(gh issue list \
            --label "$LABEL" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Updating existing health-check issue #${EXISTING}"
            gh issue edit "$EXISTING" \
              --body-file /tmp/health-report.md
            gh issue comment "$EXISTING" \
              --body "Health check re-run on $(date +%Y-%m-%d) — issue body updated above."
          else
            echo "Opening new health-check issue"
            gh issue create \
              --title "$TITLE" \
              --body-file /tmp/health-report.md \
              --label "$LABEL"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
